  <script>
    
  // 🟦 نجيب projectId من آخر جزء في الـ URL
  const PROJECT_ID = window.location.pathname.split('/').pop();
    function filterTasks(status) {
      const buttons = document.querySelectorAll('.filter-btn');
      const cards = document.querySelectorAll('.task-card');
      
      // Update active button
      buttons.forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Filter cards
      cards.forEach(card => {
        if (status === 'all') {
          card.style.display = 'block';
        } else {
          const cardStatus = card.getAttribute('data-status');
          card.style.display = cardStatus === status ? 'block' : 'none';
        }
      });
    }

    // Add click handlers for task buttons
    document.querySelectorAll('.task-button').forEach(button => {
      button.addEventListener('click', function() {
        const action = this.textContent.trim();
        console.log(`${action} button clicked for task`);
        // Add your task action logic here
      });
    });
    
  </script>
  <script>
    
    async function loadProjectDetails() {
      // استخراج project_id من الـ URL
      const pathParts = window.location.pathname.split('/');
      const projectId = pathParts[pathParts.length - 1];
    
      const res = await fetch(`/api/project_json/${projectId}`);
      if (!res.ok) { alert("Failed to load project details"); return; }
    
      const data = await res.json();
    
      document.getElementById("projectName").textContent = data.project_name;
      document.getElementById("projectDesc").textContent = data.description;
      document.getElementById("ownerName").textContent   = data.owner_name;
      document.getElementById("ownerEmail").textContent  = data.owner_email;
      window.projectCategory = data.category?.toLowerCase();

      // domain tags
      const domainContainer = document.getElementById("domainTags");
      domainContainer.innerHTML = "";
      data.domain.forEach(d => {
        const tag = document.createElement("span");

 <script>
  function escapeHtml(value = "") {
  return value
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function loadExaminerTasks() {
  const pathParts = window.location.pathname.split('/');
  const projectId = pathParts[pathParts.length - 1];

  const res = await fetch(`/api/examiner_tasks/${projectId}`);
  if (!res.ok) {
    console.error("Failed to load tasks");
    return;
  }

  const data = await res.json();
  const tasks = data.tasks || [];

  const grid = document.querySelector(".tasks-grid");
  grid.innerHTML = "";

  tasks.forEach(task => {
    const card = document.createElement("article");
    card.className = "task-card";
    card.setAttribute("data-status", task.status);

    // 🔹 وصف نوع المهمة
    let metaHTML = "";

    if (task.task_type === "model_selection") {
      const picked = task.selected_model_label || task.selectedModelLabel || "Not selected yet";
      metaHTML = `
        <div class="task-meta">
          <div class="task-meta-row">
            <span class="task-meta-label">Model Selection • ${picked}</span>
          </div>
        </div>
      `;
    } else if (task.task_type === "labeling") {
      metaHTML = `
        <div class="task-meta">
          <div class="task-meta-row">
            <span class="task-meta-label">Labeling & Feedback</span>
          </div>
        </div>
      `;
    } else if (window.projectCategory !== "article" && task.conversation_type) {
      const typeLabel =
        task.conversation_type === "human-ai" ? "Human ↔ AI" : "Human ↔ Human";
      const turnsLabel = `${task.number_of_turns} turns`;

      metaHTML = `
        <div class="task-meta">
          <div class="task-meta-row">
            <span class="task-meta-label">${typeLabel} • ${turnsLabel}</span>
          </div>
        </div>
      `;
    }

    // 🔹 الزر / الحالة
    const assignedToYou = task.is_assigned_to_you;
    let statusPillHTML = "";
    let buttonHTML = "";

    if (task.status === "completed") {
      statusPillHTML = `<span class="status-pill completed">Completed</span>`;
      buttonHTML = `
        <button 
          class="task-button completed completed-btn"
          onclick="goToTask('${task.task_id}', '${task.conversation_type || ''}', '${task.task_type || ''}')">
          Completed
        </button>
      `;
    } else if (assignedToYou) {
      buttonHTML = `
        <button 
          class="task-button primary ${task.status === 'progress' ? 'continue' : 'join'}"
          onclick="goToTask('${task.task_id}', '${task.conversation_type || ''}', '${task.task_type || ''}')">
          ${task.status === "progress" ? "Continue" : "Join"}
        </button>
      `;
    } else {
      buttonHTML = `
        <button class="task-button completed completed-btn">
          Not Assigned
        </button>
      `;
    }

    // 🔹 Assigned to
    const emails = task.examiner_emails || [];
    let assignedText = "Not assigned";

    if (emails.length === 1) {
      assignedText = emails[0];
    } else if (emails.length > 1) {
      assignedText = `${emails[0]} and ${emails.length - 1} more`;
    }

    // 🔹 Description box (مربع منفصل)
    const rawDesc = (task.task_description || "").trim();
    const showDesc =
      window.isGeneratedConversationProject === true &&
      window.projectCategory !== "article" &&
      (task.task_type === "model_selection" || task.task_type === "labeling") &&
      rawDesc.length > 0;

    const descriptionHTML = showDesc
      ? `
        <div class="task-desc-box">
          <div class="task-desc-label">Task Description</div>
          <div class="task-desc-value">${escapeHtml(rawDesc)}</div>
        </div>
      `
      : "";

    card.innerHTML = `
      <h4 class="task-title">${task.task_name}</h4>

      ${metaHTML}

      ${statusPillHTML}

      <div class="assignment-box">
        <div class="assignment-label">Assigned to:</div>
        <div class="assignment-value">${assignedText}</div>
        <div class="assignment-label" style="margin-top:4px;">
          ${emails.length} examiner${emails.length === 1 ? "" : "s"}
        </div>
      </div>

      ${descriptionHTML}

      ${buttonHTML}
    `;

    grid.appendChild(card);
  });
}

  function goToTask(taskId, type, taskType) {
    // ✅ لو Article Task
    if (!type) {
      if (taskType === 'model_selection') {
        window.location.href = `/task/${taskId}/model-selection`;
        return;
      } else if (taskType === 'labeling') {
  window.location.href = `/task/${taskId}/feedback`;

        return;
      } else {
        alert("Invalid task type");
        return;
      }
    }
    

    let basePath = null;

    if (type === "human-ai") {
      basePath = "/conversation-ai";
    } else if (type === "human-human") {
      basePath = "/conversation-hh";
    } else {
      alert("Invalid conversation type");
      return;
    }

    const url = `${basePath}?taskId=${encodeURIComponent(taskId)}&projectId=${encodeURIComponent(PROJECT_ID)}`;
    window.location.href = url;
  }

<script>
  const langToggle = document.getElementById("langToggle");
  const LANG_KEY = "ui_lang";
  let gtLoaded = false;

  function normalizeLang(v){ return v === "ar" ? "ar" : "en"; }
  function getPreferredLang(){ return sessionStorage.getItem(LANG_KEY) === "ar" ? "ar" : "en"; }

  function setActiveLang(lang){
    const safe = normalizeLang(lang);
    sessionStorage.setItem(LANG_KEY, safe);
    const val = `/en/${safe}`;
    document.cookie = `googtrans=${val}; path=/; max-age=31536000; SameSite=Lax`;
    document.cookie = `googtrans=${val}; path=/; domain=${location.hostname}; max-age=31536000; SameSite=Lax`;
  }

  function refreshLangButton(){
    if (!langToggle) return;
    const active = getPreferredLang();
    langToggle.textContent = active === "ar" ? "EN" : "AR";
    langToggle.setAttribute("translate", "no");
    langToggle.classList.add("notranslate");
  }

  function hideGoogleBar(){
    document.querySelectorAll(
      "iframe.goog-te-banner-frame, .goog-te-banner-frame, body > .skiptranslate, .goog-te-balloon-frame, #goog-gt-tt"
    ).forEach(el => {
      el.style.display = "none";
      el.style.visibility = "hidden";
      el.style.height = "0";
    });
    document.body.style.top = "0px";
    document.documentElement.style.top = "0px";
  }

  function loadGoogleTranslateOnce() {
    if (gtLoaded) return;
    gtLoaded = true;
    const s = document.createElement("script");
    s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
    s.async = true;
    document.head.appendChild(s);
  }

  function applyGoogleLang(lang, tries = 0){
    const combo = document.querySelector(".goog-te-combo");
    if (!combo){
      if (tries < 20) setTimeout(() => applyGoogleLang(lang, tries + 1), 150);
      return;
    }
    combo.value = lang;
    combo.dispatchEvent(new Event("change"));
  }

  function googleTranslateElementInit(){
    new google.translate.TranslateElement(
      { pageLanguage: "en", includedLanguages: "en,ar", autoDisplay: false },
      "google_translate_element"
    );
    hideGoogleBar();
    setInterval(hideGoogleBar, 300);
  }

  window.addEventListener("load", () => {
    if (!sessionStorage.getItem(LANG_KEY)) setActiveLang("en");
    refreshLangButton();
    hideGoogleBar();
  });

  langToggle?.addEventListener("click", () => {
    const next = getPreferredLang() === "ar" ? "en" : "ar";
    setActiveLang(next);
    refreshLangButton();
    loadGoogleTranslateOnce();
    applyGoogleLang(next);
  });
  async function loadMyRating() {
  const pathParts = window.location.pathname.split('/');
  const projectId = pathParts[pathParts.length - 1];

  const res = await fetch(`/api/project/${projectId}/my_rating`);
  const data = await res.json();
  if (!data.rated) return;

  const stars = data.stars || 0;
  const comment = data.comment || "";
  const badge = stars === 5
    ? '<span style="background:#fef9c3;color:#92400e;padding:2px 8px;border-radius:999px;border:1px solid #fde68a;font-size:11px;margin-left:6px;">🏆 Top Reviewer</span>'
    : "";

  let starsHTML = "";
  for (let i = 1; i <= 5; i++) {
    starsHTML += `<span style="font-size:20px;color:${i <= stars ? '#F59E0B' : '#d1d5db'};">★</span>`;
  }

  const box = document.getElementById("myRatingBox");
  if (!box) return;
  box.innerHTML = `
    <div style="background:#f9fafb;border-radius:12px;padding:14px 16px;margin:16px 0;border:1px solid #e5e7eb;">
      <div style="font-size:13px;color:#717182;margin-bottom:6px;">Your rating from the project owner:</div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${starsHTML}
        <span style="font-size:13px;color:#374151;margin-left:4px;">${stars} / 5</span>
        ${badge}
      </div>
      ${comment ? `<div style="font-size:13px;color:#374151;margin-top:8px;font-style:italic;">"${comment}"</div>` : ""}
    </div>`;
}
