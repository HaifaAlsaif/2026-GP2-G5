<script>
  function filterTasks(status) {
    const buttons = document.querySelectorAll('.task-filter-btn');
    const cards = document.querySelectorAll('.article-card');

    // تحديث الزر النشط
    buttons.forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
      event.target.classList.add('active');
    }

    // إظهار/إخفاء الكروت حسب الحالة
    cards.forEach(card => {
      const cardStatus = card.getAttribute('data-status');
      if (status === 'all' || status === cardStatus) {
        card.style.display = 'block';
      } else {
        card.style.display = 'none';
      }
    });
  }
  async function removeExaminer(btn) {
    const row = btn.closest(".team-member");
    const email = row.querySelector(".team-member-email").textContent.trim();
  
    if (!confirm("Are you sure you want to remove this examiner?")) return;
  
    // نجيب uid الخاص بالـ examiner من API
    const resEx = await fetch(`/api/project_examiners_owner/${projectId}`);
    const dataEx = await resEx.json();
  
    const found = dataEx.examiners.find(e => e.email === email);
    if (!found) {
      alert("Examiner not found.");
      return;
    }
  
    const payload = {
      project_id: projectId,
      examiner_id: found.id
    };
  
    const res = await fetch("/api/remove_examiner", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(payload)
    });
  
    const data = await res.json();
  
    if (data.success) {
      row.remove();     // حذف الواجهة
      alert("Examiner removed successfully.");
    } else {
      alert(data.error || "Something went wrong.");
    }
  }
  
  
 
</script>
<script>
  // ============= Modal controls =============
  function openAddExaminerModal() {
    document.getElementById("addExaminerModal").style.display = "flex";
    document.getElementById("examinerSearch").value = "";
    document.getElementById("examinerResults").style.display = "none";
  }
  
  function closeAddExaminerModal() {
    document.getElementById("addExaminerModal").style.display = "none";
  }
  
  // ============= Load volunteers list =============
  let volunteers = [];
  
  async function loadVolunteersList() {
    try {
      const res = await fetch("/api/volunteers");
      const data = await res.json();
      volunteers = data.volunteers || [];
    } catch (err) {
      console.error("Volunteer load failed:", err);
    }
  }
 loadVolunteersList();

  // ============= Search inside modal =============
document.addEventListener("DOMContentLoaded", () => {
    const examinerSearchEl = document.getElementById("examinerSearch");
    if (!examinerSearchEl) return;
    examinerSearchEl.addEventListener("input", () => {
      const q = examinerSearchEl.value.toLowerCase().trim();
      const box = document.getElementById("examinerResults");
      box.innerHTML = "";
      if (!q) return box.style.display = "none";
      const results = volunteers.filter(v =>
        v.name.toLowerCase().includes(q) ||
        v.email.toLowerCase().includes(q)
      );
      if (results.length === 0) {
        box.innerHTML = `<div style="padding:10px;color:#777;">No results</div>`;
      } else {
        results.forEach(v => {
          box.innerHTML += `
            <div onclick="selectExaminer('${v.name}','${v.email}')"
                 style="padding:10px;border-radius:8px;cursor:pointer;">
              <b>${v.name}</b><br>
              <small>${v.email}</small>
            </div>`;
        });
      }
      box.style.display = "block";
    });
  });
  
  let selectedExaminer = null;
  
  function selectExaminer(name, email) {
    selectedExaminer = { name, email };
    document.getElementById("examinerSearch").value = email;
    document.getElementById("examinerResults").style.display = "none";
  }
  
  // ============= Submit examiner =============
  async function manualAddExaminer() {
    const email = document.getElementById("examinerSearch").value.trim();
    if (!email) return alert("Enter email first");
  
    const payload = { project_id: projectId, examiner_email: email };
  
    const res = await fetch("/api/add_examiner_to_project", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  
    const data = await res.json();
  
    if (data.error) {
      alert(data.error);
      return;
    }
  
    closeAddExaminerModal();
    loadExaminers(); // refresh list
  }

<script>
  // === Get project_id from Flask URL ===
  const projectId = "{{ project_id }}";

  // === Fetch project data ===
  async function loadProjectDetails() {
    try {
      const res = await fetch(`/api/project_json_owner/${projectId}`);
      const data = await res.json();

      if (data.error) {
        console.error(data.error);
        return;
      }

      // === Fill project data ===
      document.querySelector(".project-title").textContent = data.project_name;
      document.querySelector(".project-description").textContent = data.description;

      // Owner name & email
      const ownerRow = document.querySelector(".owner-row");
      if (ownerRow) {
        ownerRow.querySelector(".owner-name").textContent = data.owner_name;
        ownerRow.querySelector(".owner-email").textContent = data.owner_email;
      }

      // Domain tags
      const domainContainer = document.querySelector(".domain-tags");
      domainContainer.innerHTML = "";
      data.domain.forEach(d => {
        domainContainer.innerHTML += `<span class="tag tag-purple">${d}</span>`;
      });

      // Category
      const rawCategory = (data.category || "").toLowerCase();
      const isConversation = rawCategory.includes("conversation");
      const isGenerated = data.generated_from_scratch === true || data.generated_from_scratch === "true";

      const displayCategory = (isConversation && isGenerated)
       ? "Generate Conversation"
       : (isConversation ? "Uploaded Conversation" : (data.category || "Conversation"));

      document.querySelector(".category-tag").textContent = displayCategory;


      // Load examiners list
      loadExaminers();
    } catch (err) {
      console.error("Failed to load project:", err);
    }
  }

    method: "POST",

    body: JSON.stringify({ examiner_id: examinerId, stars, comment })
  });

async function loadTasks() {

  const noMsg = document.getElementById("noTasksMsg");

  grid.innerHTML = "";
  noMsg.style.display = "none";

  try {
    const res = await fetch(`/api/project_tasks/${projectId}`);
    const data = await res.json();

    if (!data.tasks || !data.tasks.length) {
      noMsg.style.display = "block";
      return;
    }

      data.tasks.forEach(t => {
    const cfg = getStatusConfig(t.status);

    const card = document.createElement("article");
    card.className = "article-card";
    card.dataset.status = (t.status || "pending").toLowerCase();
    card.dataset.taskId = t.id;

    const convType = (t.conversationType || "").toLowerCase();
    const taskType = (t.taskType || "").toLowerCase();

let convText = "";
if (taskType === "model_selection") {
  const picked =
  t.selected_model_name ||
  (t.selected_model === "rnn" ? "RNN" :
   (t.selected_model === "logreg" || t.selected_model === "logistic") ? "Logistic Regression" :
   "Not selected yet");
  convText = `Detection Task • ${picked}`;
}

else if (taskType === "labeling") {
  convText = "Labeling & Feedback";
} else if (convType === "human-human") {
  convText = `Human ↔ Human • ${t.turns || 2} turns`;
} else if (convType === "human-ai") {
  convText = `Human ↔ LLM • ${t.turns || 2} turns`;
}

const examinerCount = t.examinerCount ?? 0;
const emails = (t.examinerEmails || []).join(", ") || "-";

const hasConv = convType === "human-human" || convType === "human-ai";

    card.innerHTML = `

  <script>
  const convBackdrop   = document.getElementById('convModalBackdrop');
  const convMessagesEl = document.getElementById('convMessages');
  const convTitleEl    = document.getElementById('convModalTitle');
  const convSubEl      = document.getElementById('convModalSub');

  function closeConversationModal(){
    convBackdrop.classList.remove('show');
    convMessagesEl.innerHTML = '';
  }

  async function openConversation(taskId, taskTitle, convType){
    const type = (convType || '').toLowerCase();
    const isHH = (type === 'human-human' || type === 'hh');

    convTitleEl.textContent = taskTitle || 'Conversation';
    convSubEl.textContent   = isHH
      ? 'Human ↔ Human • Turns timeline'
      : 'Human ↔ LLM • Turns timeline';

    convMessagesEl.innerHTML = 'Loading…';
    convBackdrop.classList.add('show');

    let url;
    if (isHH){
  url = `/api/hh/messages_owner?taskId=${encodeURIComponent(taskId)}`;
} else {
  url = `/api/llm/messages_owner?taskId=${encodeURIComponent(taskId)}`;
}


    try{
      const res = await fetch(url);
      if (!res.ok){
        const err = await res.json().catch(() => ({}));
        convMessagesEl.innerHTML = `<p style="font-size:13px;color:#b91c1c;">
          ${err.error || 'Failed to load conversation.'}
        </p>`;
        return;
      }

      const data = await res.json();
      const msgs = data.messages || [];

      if (!msgs.length){
        convMessagesEl.innerHTML =
          '<p style="font-size:13px;color:#64748b;">No messages yet for this task.</p>';
        return;
      }

      convMessagesEl.innerHTML = '';

      msgs.forEach(m => {
        const side = (m.side === 'right') ? 'conv-right' : 'conv-left';
        const row  = document.createElement('div');
        row.className = `conv-row ${side}`;

        const who  = m.authorLabel || m.author || 'Speaker';
        const turn = (typeof m.turnIndex === 'number' && m.turnIndex > 0)
          ? `Turn ${m.turnIndex}`
          : '';

        row.innerHTML = `
          <div class="conv-bubble">
            <div class="conv-meta">
              ${who}${turn ? ' • ' + turn : ''}
            </div>
            <div class="conv-text">${m.text || ''}</div>
          </div>
        `;
        convMessagesEl.appendChild(row);
      });

      convMessagesEl.scrollTop = convMessagesEl.scrollHeight;

    } catch(e){
      console.error('Network error while loading conversation for owner:', e);
      convMessagesEl.innerHTML =
        '<p style="font-size:13px;color:#b91c1c;">Network error. Please try again.</p>';
    }
  }

  
  // إغلاق بالضغط على الخلفية
  convBackdrop.addEventListener('click', (e) => {
    if (e.target === convBackdrop){
      closeConversationModal();
    }
  });

  // إغلاق بالـ Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape'){
      closeConversationModal();
    }
  });
</script>
<script>
  const root = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");

  function applyTheme(theme){
    const isDark = theme === "dark";
    root.setAttribute("data-theme", isDark ? "dark" : "light");
    if (themeIcon) themeIcon.textContent = isDark ? "☀" : "☾";
    if (themeToggle) themeToggle.setAttribute("aria-pressed", isDark ? "true" : "false");
  }

  const savedTheme = localStorage.getItem("theme") || "light";
  applyTheme(savedTheme);

  themeToggle?.addEventListener("click", () => {
    const current = root.getAttribute("data-theme") === "dark" ? "dark" : "light";
    const next = current === "dark" ? "light" : "dark";
    localStorage.setItem("theme", next);
    applyTheme(next);
  });
</script>
<script>
  const langToggle = document.getElementById("langToggle");

  function getCookie(name) {
    const match = document.cookie.match(new RegExp("(^|;\\s*)" + name + "=([^;]+)"));
    return match ? decodeURIComponent(match[2]) : "";
  }

  function getActiveLang() {
    const gt = getCookie("googtrans");
    const m = gt.match(/^\/[^/]+\/([^/]+)$/);
    return (m && m[1]) ? m[1].toLowerCase() : "en";
  }

  function setActiveLang(lang) {
    const val = `/en/${lang}`;
    document.cookie = `googtrans=${val}; path=/`;
    document.cookie = `googtrans=${val}; path=/; domain=${location.hostname}`;
    localStorage.setItem("ui_lang", lang);
  }

  function refreshLangButton() {
    if (!langToggle) return;
    const active = getActiveLang();
    langToggle.textContent = active === "ar" ? "EN" : "AR";
    langToggle.setAttribute("translate", "no");
    langToggle.classList.add("notranslate");
  }

  function hideGoogleBar() {
    document.querySelectorAll(
      "iframe.goog-te-banner-frame, .goog-te-banner-frame, body > .skiptranslate, .goog-te-balloon-frame, #goog-gt-tt"
    ).forEach(el => {
      el.style.display = "none";
      el.style.visibility = "hidden";
      el.style.height = "0";
    });
    document.body.style.top = "0px";
    document.documentElement.style.top = "0px";
  }

  function applyGoogleLang(lang, tries = 0) {
    const combo = document.querySelector(".goog-te-combo");
    if (!combo) {
      if (tries < 30) setTimeout(() => applyGoogleLang(lang, tries + 1), 100);
      return;
    }
    combo.value = lang;
    combo.dispatchEvent(new Event("change"));
    setTimeout(hideGoogleBar, 50);
    setTimeout(hideGoogleBar, 250);
  }

  function googleTranslateElementInit() {
    new google.translate.TranslateElement(
      { pageLanguage: "en", includedLanguages: "en,ar", autoDisplay: false },
      "google_translate_element"
    );

    const saved = localStorage.getItem("ui_lang");
    if (!getCookie("googtrans") && (saved === "ar" || saved === "en")) {
      setActiveLang(saved);
    }

    refreshLangButton();
    hideGoogleBar();
    setInterval(hideGoogleBar, 250);
  }

  window.addEventListener("load", () => {
    refreshLangButton();
    hideGoogleBar();
    applyGoogleLang(getActiveLang());
  });

  langToggle?.addEventListener("click", () => {
    const active = getActiveLang();
    const next = active === "ar" ? "en" : "ar";
    setActiveLang(next);
    refreshLangButton();
    applyGoogleLang(next);
  });
</script>
